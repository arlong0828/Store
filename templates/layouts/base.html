{% load static %}
<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="結合商品影像與人臉辨識的智慧無人商店體驗。">
  <title>{% block title %}Stride AI 無人商店{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'images/brand/favicon.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <a class="skip-link" href="#main-content">跳到主要內容</a>
  {% include "components/header.html" %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "components/footer.html" %}
  <script src="{% static 'js/app.js' %}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
