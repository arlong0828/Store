{% extends "layouts/base.html" %}
{% block title %}編輯個人資料｜Stride AI{% endblock %}
{% block body_class %}app-page{% endblock %}
{% block content %}
<section class="form-section">
  <div class="shell narrow-shell">
    <div class="form-heading"><p class="eyebrow"><span></span> EDIT PROFILE</p><h1>更新個人資料</h1><p>留空的照片欄位會保留目前的辨識照片。</p></div>
    <form class="form-card" action="{% url 'profile-edit' %}" method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-grid"><label><span>姓名</span><input type="text" name="name" value="{{ memberlist_get.cName }}" required></label><label><span>性別</span><input type="text" name="sex" value="{{ memberlist_get.cSex }}" required></label><label class="full"><span>電子信箱</span><input type="email" name="email" value="{{ memberlist_get.cEmail }}" required></label><label class="full"><span>新密碼</span><input type="password" name="passward" value="{{ memberlist_get.cPassward }}" required></label></div>
      <div class="upload-section"><div><h2>更新辨識照片</h2><p>只選擇需要替換的照片即可。</p></div><div class="face-photo-grid editable"><label><img src="{{ memberlist_get.cPhoto1.url }}" alt="照片 1"><span>替換照片 01</span><input type="file" name="photo1" accept="image/jpeg,image/png"></label><label><img src="{{ memberlist_get.cPhoto2.url }}" alt="照片 2"><span>替換照片 02</span><input type="file" name="photo2" accept="image/jpeg,image/png"></label><label><img src="{{ memberlist_get.cPhoto3.url }}" alt="照片 3"><span>替換照片 03</span><input type="file" name="photo3" accept="image/jpeg,image/png"></label></div></div>
      <div class="form-actions"><a class="button button-ghost" href="{% url 'profile' %}">取消</a><button class="button button-primary" type="submit" name="revise">儲存變更 <span>→</span></button></div>
    </form>
  </div>
</section>
{% endblock %}
